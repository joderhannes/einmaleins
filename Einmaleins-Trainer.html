const GRID = 10;
const FAST = 2000;
const SLOW = 4000;
const MIN_ATT = 3;
const SPRINT_N = 20;
const FOCUS_N = 10;
const SKEY = "einmaleins_v2";

// ─── Data ───
function load() { try { const r = localStorage.getItem(SKEY); return r ? JSON.parse(r) : {}; } catch { return {}; } }
function save(d) { try { localStorage.setItem(SKEY, JSON.stringify(d)); } catch {} }
function key(a, b) { return Math.min(a,b) + "x" + Math.max(a,b); }
function stats(d, a, b) { return d[key(a,b)] || { times: [], errors: 0, attempts: 0 }; }
function record(d, a, b, ms, ok) {
  const k = key(a,b), p = d[k] || { times: [], errors: 0, attempts: 0 };
  return { ...d, [k]: { times: [...p.times, ms].slice(-5), errors: p.errors + (ok?0:1), attempts: p.attempts + 1 } };
}
function avg(s) { if (!s.times.length) return null; const t = s.times.slice(-3); return t.reduce((a,b)=>a+b,0)/t.length; }
function status(s) {
  if (s.attempts < MIN_ATT) return "unset";
  const a = avg(s), e = s.errors / s.attempts;
  if (e > 0.3 || a > SLOW) return "slow";
  if (a > FAST) return "medium";
  return "fast";
}
function sColor(st) { return { fast:"var(--c-green)", medium:"var(--c-yellow)", slow:"var(--c-red)", unset:"var(--c-gray)" }[st]; }
function sTextColor(st) { return { fast:"var(--c-green-text)", medium:"var(--c-yellow-text)", slow:"var(--c-red-text)", unset:"var(--c-text-dim)" }[st]; }
function allPairs() { const p=[]; for(let a=1;a<=GRID;a++) for(let b=a;b<=GRID;b++) p.push([a,b]); return p; }
function weakPairs(d, n) {
  return allPairs().map(([a,b])=>{ const s=stats(d,a,b), av=avg(s)||99999, e=s.attempts>0?s.errors/s.attempts:0.5; return{p:[a,b],sc:av+e*5000}; })
    .sort((a,b)=>b.sc-a.sc).slice(0,n).map(x=>x.p);
}
function sprintQ(d, n) {
  const w = []; allPairs().forEach(([a,b])=>{ const st=status(stats(d,a,b)); const wt=st==="slow"?4:st==="medium"?2:st==="unset"?3:1; for(let i=0;i<wt;i++) w.push([a,b]); });
  return Array.from({length:n}, ()=>{ const [a,b]=w[Math.floor(Math.random()*w.length)]; return Math.random()>0.5?[b,a]:[a,b]; });
}
function fmt(ms) { return (ms/1000).toFixed(1)+"s"; }

// ─── Confetti ───
function Confetti({trigger}) {
  const [ps, setPs] = useState([]);
  useEffect(()=>{ if(!trigger) return; const cols=["#4ADE80","#FACC15","#FB923C","#60A5FA","#F472B6","#A78BFA"];
    setPs(Array.from({length:28},(_,i)=>({i,x:50+(Math.random()-.5)*70,y:40+(Math.random()-.5)*20,s:.4+Math.random(),c:cols[i%6],dl:Math.random()*.4,r:Math.random()>.5}))); 
    const t=setTimeout(()=>setPs([]),1400); return()=>clearTimeout(t); },[trigger]);
  if(!ps.length) return null;
  return h("div",{style:{position:"fixed",inset:0,pointerEvents:"none",zIndex:999}},
    ps.map(p=>h("div",{key:p.i,style:{position:"absolute",left:p.x+"%",top:p.y+"%",width:10*p.s,height:10*p.s,borderRadius:p.r?"50%":"2px",background:p.c,animation:`confettiFall 1.2s ease-out ${p.dl}s forwards`,opacity:0}})));
}

// ─── NumPad ───
function NumPad({value,onInput,onDel,onOk,disabled}) {
  const keys = [1,2,3,4,5,6,7,8,9,"DEL",0,"OK"];
  function mkBtn(k) {
    const isD=k==="DEL", isO=k==="OK", isA=isD||isO;
    const dis = disabled||(isO&&!value);
    return h("button",{key:k,disabled:dis,
      onClick:()=>{ if(isD)onDel(); else if(isO)onOk(); else onInput(String(k)); },
      onPointerDown:e=>{if(!dis)e.currentTarget.style.transform="scale(0.92)";},
      onPointerUp:e=>{e.currentTarget.style.transform="scale(1)";},
      onPointerLeave:e=>{e.currentTarget.style.transform="scale(1)";},
      style:{height:62,borderRadius:14,border:"none",fontSize:isA?15:24,fontWeight:700,fontFamily:"'DM Sans',sans-serif",
        cursor:dis?"default":"pointer",
        background:isO?"var(--c-accent)":isD?"var(--c-surface-alt)":"var(--c-surface)",
        color:isO?"#fff":"var(--c-text)",opacity:dis?0.35:1,transition:"transform .1s,opacity .15s",letterSpacing:isA?1:0}},
      isD?"⌫":isO?"✓":k);
  }
  return h("div",{style:{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,maxWidth:320,margin:"0 auto"}},keys.map(mkBtn));
}

// ─── Heatmap ───
function Heatmap({data,onSprint,onFocus,onCell}) {
  const wk = weakPairs(data,FOCUS_N).filter(([a,b])=>{const s=status(stats(data,a,b));return s!=="fast";}).length;
  
  // Count mastered
  const mastered = allPairs().filter(([a,b])=>status(stats(data,a,b))==="fast").length;
  const total = allPairs().length;
  
  return h("div",{style:{padding:"env(safe-area-inset-top, 20px) 16px 20px",maxWidth:700,margin:"0 auto"}},
    h("div",{style:{textAlign:"center",marginBottom:20,animation:"fadeInUp .4s ease"}},
      h("h1",{style:{fontFamily:"'Fredoka',sans-serif",fontSize:30,fontWeight:600,color:"var(--c-text)",margin:"16px 0 2px"}},"Einmaleins-Trainer"),
      mastered > 0 && h("p",{style:{fontSize:14,color:"var(--c-text-dim)",fontFamily:"'DM Sans',sans-serif",margin:"2px 0 0"}},
        mastered + " von " + total + " gemeistert"),
    ),
    // Grid
    h("div",{style:{marginBottom:20,animation:"fadeInUp .5s ease"}},
      h("div",{style:{display:"grid",gridTemplateColumns:"30px repeat("+GRID+",1fr)",gridTemplateRows:"26px repeat("+GRID+",1fr)",gap:3}},
        // Corner
        h("div",{style:{display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,fontWeight:700,color:"var(--c-text-dim)",fontFamily:"'DM Sans',sans-serif"}},"×"),
        // Col headers
        ...Array.from({length:GRID},(_,i)=>h("div",{key:"c"+i,style:{display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:700,color:"var(--c-text-dim)",fontFamily:"'DM Sans',sans-serif"}},i+1)),
        // Rows
        ...Array.from({length:GRID},(_,row)=>[
          h("div",{key:"r"+row,style:{display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:700,color:"var(--c-text-dim)",fontFamily:"'DM Sans',sans-serif"}},row+1),
          ...Array.from({length:GRID},(_,col)=>{
            const a=row+1,b=col+1,s=stats(data,a,b),st=status(s);
            return h("button",{key:a+"-"+b,onClick:()=>onCell(a,b),
              onPointerDown:e=>{e.currentTarget.style.transform="scale(0.88)";},
              onPointerUp:e=>{e.currentTarget.style.transform="scale(1)";},
              onPointerLeave:e=>{e.currentTarget.style.transform="scale(1)";},
              style:{aspectRatio:"1",borderRadius:6,border:"none",background:sColor(st),display:"flex",alignItems:"center",justifyContent:"center",
                fontSize:11,fontWeight:600,color:sTextColor(st),fontFamily:"'DM Sans',sans-serif",cursor:"pointer",transition:"transform .12s"}},a*b);
          })
        ]).flat()
      )
    ),
    // Legend
    h("div",{style:{display:"flex",gap:14,justifyContent:"center",marginBottom:24,flexWrap:"wrap"}},
      [["var(--c-green)","Sitzt!"],["var(--c-yellow)","Fast"],["var(--c-red)","Üben"],["var(--c-gray)","Neu"]].map(([c,l])=>
        h("div",{key:l,style:{display:"flex",alignItems:"center",gap:5}},
          h("div",{style:{width:13,height:13,borderRadius:4,background:c}}),
          h("span",{style:{fontSize:12,color:"var(--c-text-dim)",fontFamily:"'DM Sans',sans-serif"}},l)))),
    // Buttons
    h("div",{style:{display:"flex",gap:12,justifyContent:"center",flexWrap:"wrap"}},
      h("button",{onClick:onSprint,style:btnS("var(--c-accent)")},"🏃 Sprint"),
      h("button",{onClick:onFocus,disabled:wk===0,style:{...btnS("var(--c-orange)"),opacity:wk===0?.35:1}},"🎯 Fokus")),
    // Reset
    h("div",{style:{textAlign:"center",marginTop:24}},
      h("button",{onClick:()=>{if(confirm("Alle Fortschritte zurücksetzen?")){localStorage.removeItem(SKEY);location.reload();}},
        style:{background:"none",border:"none",fontSize:12,color:"var(--c-text-dim)",cursor:"pointer",fontFamily:"'DM Sans',sans-serif",textDecoration:"underline",opacity:.6}},"Fortschritt zurücksetzen"))
  );
}
function btnS(bg){return{padding:"14px 32px",borderRadius:14,border:"none",background:bg,color:"#fff",fontSize:16,fontWeight:700,fontFamily:"'Fredoka',sans-serif",cursor:"pointer",letterSpacing:.3};}

// ─── Cell Detail ───
function Detail({a,b,data,onClose}) {
  const s=stats(data,a,b),st=status(s),av=avg(s);
  return h("div",{onClick:onClose,style:{position:"fixed",inset:0,background:"rgba(0,0,0,.45)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100,padding:20}},
    h("div",{onClick:e=>e.stopPropagation(),style:{background:"var(--c-bg)",borderRadius:22,padding:30,minWidth:260,maxWidth:340,textAlign:"center",boxShadow:"0 24px 60px rgba(0,0,0,.3)",animation:"slideIn .25s ease"}},
      h("div",{style:{fontSize:40,fontWeight:700,fontFamily:"'Fredoka',sans-serif",color:"var(--c-text)",marginBottom:6}},a+" × "+b+" = "+a*b),
      h("div",{style:{display:"inline-block",padding:"5px 16px",borderRadius:20,background:sColor(st),fontSize:13,fontWeight:600,fontFamily:"'DM Sans',sans-serif",marginBottom:18,color:sTextColor(st)}},
        st==="fast"?"Gemeistert ✓":st==="medium"?"Fast geschafft":st==="slow"?"Noch üben":"Noch nicht geübt"),
      h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12,marginBottom:22}},
        [["⌀ Zeit",av?fmt(av):"—"],["Versuche",s.attempts],["Fehler",s.errors]].map(([l,v])=>
          h("div",{key:l},
            h("div",{style:{fontSize:24,fontWeight:700,fontFamily:"'Fredoka',sans-serif",color:"var(--c-text)"}},v),
            h("div",{style:{fontSize:11,color:"var(--c-text-dim)",fontFamily:"'DM Sans',sans-serif"}},l)))),
      h("button",{onClick:onClose,style:{...btnS("var(--c-surface-alt)"),color:"var(--c-text)",fontSize:14,padding:"10px 28px"}},"Schließen")));
}

// ─── Quiz ───
function Quiz({initQ,data,setData,mode,onDone}) {
  const [q,setQ]=useState(initQ);
  const [idx,setIdx]=useState(0);
  const [inp,setInp]=useState("");
  const [fb,setFb]=useState(null);
  const [t0,setT0]=useState(Date.now());
  const [res,setRes]=useState([]);
  const [retry,setRetry]=useState([]);
  const [done,setDone]=useState(false);
  const [ck,setCk]=useState(0);
  const timer=useRef(null);

  useEffect(()=>{setT0(Date.now());},[idx,q.length]);

  const submit=useCallback(()=>{
    if(!inp||fb) return;
    const [a,b]=q[idx], ok=parseInt(inp)===a*b, ms=Date.now()-t0;
    const nd=record(data,a,b,ms,ok); setData(nd); save(nd);
    const r={a,b,ans:parseInt(inp),correct:ok,time:ms};
    setRes(prev=>[...prev,r]);
    if(!ok) setRetry(prev=>[...prev,[a,b]]);
    setFb(ok?"ok":"no");
    if(ok) setCk(c=>c+1);
    timer.current=setTimeout(()=>{
      setFb(null); setInp("");
      const nextIdx=idx+1;
      if(nextIdx<q.length){setIdx(nextIdx);}
      else {
        const rq=[...retry,...(ok?[]:[[a,b]])];
        if(rq.length>0){
          setQ(prev=>[...prev,...rq.map(([x,y])=>Math.random()>.5?[y,x]:[x,y])]);
          setRetry([]); setIdx(nextIdx);
        } else { setDone(true); }
      }
    },ok?450:1600);
  },[inp,q,idx,t0,data,retry,fb]);

  if(done) return Result({res,mode,onDone});
  if(!q[idx]) return null;
  const [a,b]=q[idx];

  return h("div",{style:{padding:"env(safe-area-inset-top,20px) 16px 20px",maxWidth:420,margin:"0 auto",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",minHeight:"100dvh",gap:10}},
    h(Confetti,{trigger:ck}),
    // Progress bar
    h("div",{style:{width:"100%",display:"flex",alignItems:"center",gap:12,marginBottom:4}},
      h("button",{onClick:()=>{clearTimeout(timer.current);onDone();},style:{background:"none",border:"none",fontSize:22,cursor:"pointer",color:"var(--c-text-dim)",padding:4}},"←"),
      h("div",{style:{flex:1,height:6,borderRadius:3,background:"var(--c-surface-alt)",overflow:"hidden"}},
        h("div",{style:{height:"100%",borderRadius:3,background:"var(--c-accent)",width:((idx+1)/q.length*100)+"%",transition:"width .3s"}})),
      h("span",{style:{fontSize:13,fontWeight:600,color:"var(--c-text-dim)",fontFamily:"'DM Sans',sans-serif",minWidth:48,textAlign:"right"}},(idx+1)+"/"+q.length)),
    // Mode
    h("div",{style:{fontSize:12,fontWeight:600,letterSpacing:1.5,color:mode==="focus"?"var(--c-orange)":"var(--c-accent)",fontFamily:"'DM Sans',sans-serif",textTransform:"uppercase"}},
      mode==="focus"?"🎯 Fokus":"🏃 Sprint"),
    // Task
    h("div",{key:idx,style:{fontSize:56,fontWeight:700,fontFamily:"'Fredoka',sans-serif",color:"var(--c-text)",margin:"8px 0",animation:"fadeInUp .2s ease"}},a+" × "+b),
    // Answer
    h("div",{style:{fontSize:44,fontWeight:700,fontFamily:"'Fredoka',sans-serif",height:64,display:"flex",alignItems:"center",justifyContent:"center",
      color:fb==="ok"?"var(--c-green-text)":fb==="no"?"var(--c-red-text)":"var(--c-text)",
      background:fb==="ok"?"var(--c-green)":fb==="no"?"var(--c-red)":"var(--c-surface)",
      borderRadius:18,minWidth:170,padding:"0 28px",transition:"background .2s,color .2s",
      animation:fb?"pulse .3s ease":"none"}},
      fb==="no"?h("span",{style:{fontSize:30}},a*b):(inp||h("span",{style:{opacity:.2}},"?"))),
    fb==="no"&&h("div",{style:{fontSize:13,color:"var(--c-red-text)",fontFamily:"'DM Sans',sans-serif",fontWeight:600,animation:"fadeInUp .2s"}},"Richtig: "+a*b),
    // Pad
    h("div",{style:{marginTop:10,width:"100%",maxWidth:320}},
      h(NumPad,{value:inp,onInput:d=>{if(!fb&&inp.length<3)setInp(inp+d);},onDel:()=>{if(!fb)setInp(inp.slice(0,-1));},onOk:submit,disabled:!!fb}))
  );
}

// ─── Results ───
function Result({res,mode,onDone}) {
  const ok=res.filter(r=>r.correct), tt=res.reduce((s,r)=>s+r.time,0);
  const at=ok.length?ok.reduce((s,r)=>s+r.time,0)/ok.length:0;
  const slow=[...res].filter(r=>r.correct).sort((a,b)=>b.time-a.time).slice(0,3);
  const fast=[...res].filter(r=>r.correct).sort((a,b)=>a.time-b.time).slice(0,3);
  const allOk=ok.length===res.length;

  return h("div",{style:{padding:"40px 20px",maxWidth:460,margin:"0 auto",textAlign:"center",animation:"slideIn .4s ease"}},
    allOk&&h(Confetti,{trigger:Date.now()}),
    h("div",{style:{fontSize:44,marginBottom:8}},allOk?"🎉":ok.length/res.length>.8?"💪":"📝"),
    h("h2",{style:{fontFamily:"'Fredoka',sans-serif",fontSize:28,fontWeight:600,color:"var(--c-text)",margin:"0 0 4px"}},allOk?"Alles richtig!":"Geschafft!"),
    h("p",{style:{fontFamily:"'DM Sans',sans-serif",fontSize:14,color:"var(--c-text-dim)",margin:"0 0 28px"}},(mode==="focus"?"Fokus-Training":"Sprint")+" beendet"),
    // Stats
    h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12,marginBottom:30}},
      [["Richtig",ok.length+"/"+res.length],["⌀ Zeit",fmt(at)],["Gesamt",fmt(tt)]].map(([l,v])=>
        h("div",{key:l,style:{background:"var(--c-surface)",borderRadius:16,padding:18}},
          h("div",{style:{fontSize:24,fontWeight:700,fontFamily:"'Fredoka',sans-serif",color:"var(--c-text)"}},v),
          h("div",{style:{fontSize:11,color:"var(--c-text-dim)",fontFamily:"'DM Sans',sans-serif",marginTop:3}},l)))),
    // Slow
    slow.length>0&&h("div",{style:{marginBottom:20,textAlign:"left"}},
      h("h3",{style:{fontFamily:"'DM Sans',sans-serif",fontSize:13,fontWeight:700,color:"var(--c-text-dim)",marginBottom:8,letterSpacing:.5}},"🐢 Am langsamsten"),
      slow.map((r,i)=>h("div",{key:i,style:{display:"flex",justifyContent:"space-between",padding:"10px 14px",background:"var(--c-surface)",borderRadius:12,marginBottom:5,fontFamily:"'DM Sans',sans-serif",fontSize:15}},
        h("span",{style:{fontWeight:600,color:"var(--c-text)"}},r.a+" × "+r.b+" = "+r.a*r.b),
        h("span",{style:{color:"var(--c-orange)",fontWeight:700}},fmt(r.time))))),
    // Fast
    fast.length>0&&h("div",{style:{marginBottom:30,textAlign:"left"}},
      h("h3",{style:{fontFamily:"'DM Sans',sans-serif",fontSize:13,fontWeight:700,color:"var(--c-text-dim)",marginBottom:8,letterSpacing:.5}},"⚡ Am schnellsten"),
      fast.map((r,i)=>h("div",{key:i,style:{display:"flex",justifyContent:"space-between",padding:"10px 14px",background:"var(--c-surface)",borderRadius:12,marginBottom:5,fontFamily:"'DM Sans',sans-serif",fontSize:15}},
        h("span",{style:{fontWeight:600,color:"var(--c-text)"}},r.a+" × "+r.b+" = "+r.a*r.b),
        h("span",{style:{color:"var(--c-green-text)",fontWeight:700}},fmt(r.time))))),
    h("button",{onClick:onDone,style:btnS("var(--c-accent)")},"Zurück zur Übersicht"));
}

// ─── App ───
function App() {
  const [data,setData]=useState(load);
  const [scr,setScr]=useState("map");
  const [qq,setQq]=useState([]);
  const [det,setDet]=useState(null);

  return h("div",{style:{minHeight:"100dvh",background:"var(--c-bg)"}},
    scr==="map"&&h(Heatmap,{data,onSprint:()=>{setQq(sprintQ(data,SPRINT_N));setScr("sprint");},
      onFocus:()=>{const w=weakPairs(data,FOCUS_N);setQq(w.map(([a,b])=>Math.random()>.5?[b,a]:[a,b]));setScr("focus");},
      onCell:(a,b)=>setDet([a,b])}),
    (scr==="sprint"||scr==="focus")&&h(Quiz,{key:scr+qq.length,initQ:qq,data,setData,mode:scr,onDone:()=>setScr("map")}),
    det&&h(Detail,{a:det[0],b:det[1],data,onClose:()=>setDet(null)}));
}

ReactDOM.createRoot(document.getElementById("root")).render(h(App));
</script>


</body></html>
