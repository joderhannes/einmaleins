function ky(a,b){return Math.min(a,b)+"x"+Math.max(a,b);}

  if(rate>=0.5) return "medium";

function sColor(c){return{fast:"var(--c-green)",medium:"var(--c-yellow)",slow:"var(--c-red)",unset:"var(--c-gray)"}[c];}
function sTextColor(c){return{fast:"var(--c-green-text)",medium:"var(--c-yellow-text)",slow:"var(--c-red-text)",unset:"var(--c-text-dim)"}[c];}
function allPairs(){const p=[];for(let a=1;a<=GRID;a++)for(let b=a;b<=GRID;b++)p.push([a,b]);return p;}
function sprintQ(d,n){
  const w=[];allPairs().forEach(([a,b])=>{const s=cellStatus(gst(d,a,b));const wt=s==="slow"?4:s==="medium"?2:s==="unset"?3:1;for(let i=0;i<wt;i++)w.push([a,b]);});
  return Array.from({length:n},()=>{const[a,b]=w[Math.floor(Math.random()*w.length)];return Math.random()>.5?[b,a]:[a,b];});
}

// ─── Confetti ───
function Confetti({trigger}){
  const[ps,setPs]=useState([]);
  useEffect(()=>{if(!trigger)return;const cols=["#4ADE80","#FACC15","#FB923C","#60A5FA","#F472B6","#A78BFA"];
    setPs(Array.from({length:28},(_,i)=>({i,x:50+(Math.random()-.5)*70,y:40+(Math.random()-.5)*20,s:.4+Math.random(),c:cols[i%6],dl:Math.random()*.4,r:Math.random()>.5})));
    const t=setTimeout(()=>setPs([]),1400);return()=>clearTimeout(t);},[trigger]);
  if(!ps.length)return null;
  return h("div",{style:{position:"fixed",inset:0,pointerEvents:"none",zIndex:999}},
    ps.map(p=>h("div",{key:p.i,style:{position:"absolute",left:p.x+"%",top:p.y+"%",width:10*p.s,height:10*p.s,borderRadius:p.r?"50%":"2px",background:p.c,animation:"confettiFall 1.2s ease-out "+p.dl+"s forwards",opacity:0}})));
}

// ─── Timer Circle ───
function TimerCircle({timeLeft,totalTime}){
  const frac=Math.max(0,timeLeft/totalTime);
  const r=28,circ=2*Math.PI*r;
  const urgent=timeLeft<=3&&timeLeft>0;
  const color=timeLeft<=0?"var(--c-red)":urgent?"var(--c-red)":timeLeft<=totalTime*0.4?"var(--c-orange)":"var(--c-accent)";
  return h("div",{style:{position:"relative",width:72,height:72,flexShrink:0}},
    h("svg",{width:72,height:72,style:{transform:"rotate(-90deg)"}},
      h("circle",{cx:36,cy:36,r:r,fill:"none",stroke:"var(--c-surface-alt)",strokeWidth:5}),
      h("circle",{cx:36,cy:36,r:r,fill:"none",stroke:color,strokeWidth:5,strokeLinecap:"round",
        strokeDasharray:circ,strokeDashoffset:circ*(1-frac),style:{transition:"stroke-dashoffset 0.15s linear,stroke 0.3s"}})),
    h("div",{style:{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",
      fontSize:urgent?22:20,fontWeight:700,fontFamily:"'Fredoka',sans-serif",
      color:color,animation:urgent?"pulse .5s infinite":"none"}},
      Math.ceil(Math.max(0,timeLeft))));
}

// ─── NumPad ───
function NumPad({value,onInput,onDel,onOk,disabled}){
  const keys=[1,2,3,4,5,6,7,8,9,"DEL",0,"OK"];
  return h("div",{style:{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,maxWidth:300,margin:"0 auto"}},
    keys.map(k=>{
      const isD=k==="DEL",isO=k==="OK",isA=isD||isO,dis=disabled||(isO&&!value);
      return h("button",{key:k,disabled:dis,
        onClick:()=>{if(isD)onDel();else if(isO)onOk();else onInput(String(k));},
        onPointerDown:e=>{if(!dis)e.currentTarget.style.transform="scale(0.92)";},
        onPointerUp:e=>{e.currentTarget.style.transform="scale(1)";},
        onPointerLeave:e=>{e.currentTarget.style.transform="scale(1)";},
        style:{height:58,borderRadius:14,border:"none",fontSize:isA?15:24,fontWeight:700,fontFamily:"'DM Sans',sans-serif",
          cursor:dis?"default":"pointer",background:isO?"var(--c-accent)":isD?"var(--c-surface-alt)":"var(--c-surface)",
          color:isO?"#fff":"var(--c-text)",opacity:dis?.35:1,transition:"transform .1s,opacity .15s",letterSpacing:isA?1:0}},
        isD?"\u232B":isO?"\u2713":k);
    }));
}

// ─── Heatmap ───
function Heatmap({data,onStart,onCell}){
  const mastered=allPairs().filter(([a,b])=>cellStatus(gst(data,a,b))==="fast").length;
  const total=allPairs().length;
  return h("div",{style:{padding:"env(safe-area-inset-top,20px) 16px 20px",maxWidth:700,margin:"0 auto"}},
    h("div",{style:{textAlign:"center",marginBottom:20,animation:"fadeInUp .4s ease"}},
      h("h1",{style:{fontFamily:"'Fredoka',sans-serif",fontSize:30,fontWeight:600,color:"var(--c-text)",margin:"16px 0 2px"}},"Einmaleins-Trainer"),
      mastered>0&&h("p",{style:{fontSize:14,color:"var(--c-text-dim)",fontFamily:"'DM Sans',sans-serif",margin:"2px 0 0"}},
        mastered+" von "+total+" gemeistert")),
    h("div",{style:{marginBottom:20,animation:"fadeInUp .5s ease"}},
      h("div",{style:{display:"grid",gridTemplateColumns:"30px repeat("+GRID+",1fr)",gridTemplateRows:"26px repeat("+GRID+",1fr)",gap:3}},
        h("div",{style:{display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,fontWeight:700,color:"var(--c-text-dim)",fontFamily:"'DM Sans',sans-serif"}},"\u00D7"),
        ...Array.from({length:GRID},(_,i)=>h("div",{key:"c"+i,style:{display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:700,color:"var(--c-text-dim)",fontFamily:"'DM Sans',sans-serif"}},i+1)),
        ...Array.from({length:GRID},(_,row)=>[
          h("div",{key:"r"+row,style:{display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:700,color:"var(--c-text-dim)",fontFamily:"'DM Sans',sans-serif"}},row+1),
          ...Array.from({length:GRID},(_,col)=>{
            const a=row+1,b=col+1,s=gst(data,a,b),cs=cellStatus(s);
            return h("button",{key:a+"-"+b,onClick:()=>onCell(a,b),
              onPointerDown:e=>{e.currentTarget.style.transform="scale(0.88)";},
              onPointerUp:e=>{e.currentTarget.style.transform="scale(1)";},
              onPointerLeave:e=>{e.currentTarget.style.transform="scale(1)";},
              style:{aspectRatio:"1",borderRadius:6,border:"none",background:sColor(cs),display:"flex",alignItems:"center",justifyContent:"center",
                fontSize:11,fontWeight:600,color:sTextColor(cs),fontFamily:"'DM Sans',sans-serif",cursor:"pointer",transition:"transform .12s"}},a*b);
          })
        ]).flat())),
    h("div",{style:{display:"flex",gap:14,justifyContent:"center",marginBottom:28,flexWrap:"wrap"}},
      [["var(--c-green)","Sitzt!"],["var(--c-yellow)","Fast"],["var(--c-red)","\u00DCben"],["var(--c-gray)","Neu"]].map(([c,l])=>
        h("div",{key:l,style:{display:"flex",alignItems:"center",gap:5}},
          h("div",{style:{width:13,height:13,borderRadius:4,background:c}}),
          h("span",{style:{fontSize:12,color:"var(--c-text-dim)",fontFamily:"'DM Sans',sans-serif"}},l)))),
    h("div",{style:{display:"flex",gap:12,justifyContent:"center",flexWrap:"wrap"}},
      Object.entries(MODES).map(([id,m])=>
        h("button",{key:id,onClick:()=>onStart(id),
          style:{padding:"14px 24px",borderRadius:14,border:"none",background:m.color,color:"#fff",
            fontSize:15,fontWeight:700,fontFamily:"'Fredoka',sans-serif",cursor:"pointer",letterSpacing:.3,
            display:"flex",alignItems:"center",gap:8}},
          m.icon+" "+m.label+" ("+m.time+"s)"))),
    h("div",{style:{textAlign:"center",marginTop:24}},
      h("button",{onClick:()=>{if(confirm("Alle Fortschritte zur\u00FCcksetzen?")){localStorage.removeItem(SKEY);location.reload();}},
        style:{background:"none",border:"none",fontSize:12,color:"var(--c-text-dim)",cursor:"pointer",fontFamily:"'DM Sans',sans-serif",textDecoration:"underline",opacity:.6}},"Fortschritt zur\u00FCcksetzen")));
}

// ─── Cell Detail ───
function Detail({a,b,data,onClose}){
  const s=gst(data,a,b),cs=cellStatus(s),t=s.correct+s.wrong;
  const rate=t>0?Math.round(s.correct/t*100):0;
  return h("div",{onClick:onClose,style:{position:"fixed",inset:0,background:"rgba(0,0,0,.45)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100,padding:20}},
    h("div",{onClick:e=>e.stopPropagation(),style:{background:"var(--c-bg)",borderRadius:22,padding:30,minWidth:260,maxWidth:340,textAlign:"center",boxShadow:"0 24px 60px rgba(0,0,0,.3)",animation:"slideIn .25s ease"}},
      h("div",{style:{fontSize:40,fontWeight:700,fontFamily:"'Fredoka',sans-serif",color:"var(--c-text)",marginBottom:6}},a+" \u00D7 "+b+" = "+a*b),
      h("div",{style:{display:"inline-block",padding:"5px 16px",borderRadius:20,background:sColor(cs),fontSize:13,fontWeight:600,fontFamily:"'DM Sans',sans-serif",marginBottom:18,color:sTextColor(cs)}},
        cs==="fast"?"Gemeistert \u2713":cs==="medium"?"Fast geschafft":cs==="slow"?"Noch \u00FCben":"Noch nicht ge\u00FCbt"),
      h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12,marginBottom:22}},
        [["Richtig",s.correct],["Falsch",s.wrong],["Quote",t>0?rate+"%":"\u2014"]].map(([l,v])=>
          h("div",{key:l},
            h("div",{style:{fontSize:24,fontWeight:700,fontFamily:"'Fredoka',sans-serif",color:"var(--c-text)"}},v),
            h("div",{style:{fontSize:11,color:"var(--c-text-dim)",fontFamily:"'DM Sans',sans-serif"}},l)))),
      h("button",{onClick:onClose,style:{padding:"10px 28px",borderRadius:14,border:"none",background:"var(--c-surface-alt)",color:"var(--c-text)",fontSize:14,fontWeight:700,fontFamily:"'Fredoka',sans-serif",cursor:"pointer"}},"Schlie\u00DFen")));
}

// ─── Quiz ───
function Quiz({initQ,data,setData,mode,onDone}){
  const mc=MODES[mode];
  const[q,setQ]=useState(initQ);
  const[idx,setIdx]=useState(0);
  const[inp,setInp]=useState("");
  const[fb,setFb]=useState(null);
  const[res,setRes]=useState([]);
  const[retry,setRetry]=useState([]);
  const[done,setDone]=useState(false);
  const[ck,setCk]=useState(0);
  const[phase,setPhase]=useState("main");
  const[timeLeft,setTimeLeft]=useState(mc.time);
  const origCount=useRef(initQ.length);
  const fbTimer=useRef(null);
  const tickRef=useRef(null);
  const startRef=useRef(Date.now());
  const handledTimeout=useRef(false);
  const qRef=useRef(idx);
  qRef.current=idx;

  function startTick(){
    clearInterval(tickRef.current);
    handledTimeout.current=false;
    startRef.current=Date.now();
    setTimeLeft(mc.time);
    tickRef.current=setInterval(()=>{
      const elapsed=(Date.now()-startRef.current)/1000;
      const rem=mc.time-elapsed;
      if(rem<=0){
        clearInterval(tickRef.current);
        setTimeLeft(0);
        if(!handledTimeout.current){
          handledTimeout.current=true;
          doTimeout();
        }
      } else {
        setTimeLeft(rem);
      }
    },80);
  }

  useEffect(()=>{
    if(!fb) startTick();
    return()=>clearInterval(tickRef.current);
  },[idx]);

  useEffect(()=>()=>{clearInterval(tickRef.current);clearTimeout(fbTimer.current);},[]);

  function doTimeout(){
    const i=qRef.current;
    if(i>=q.length) return;
    const[a,b]=q[i];
    const nd=rec(data,a,b,false);setData(nd);save(nd);
    setRes(prev=>[...prev,{a,b,ans:null,correct:false,timeout:true}]);
    if(phase==="main") setRetry(prev=>[...prev,[a,b]]);
    setFb("timeout");
    fbTimer.current=setTimeout(()=>advance(),2000);
  }

  function advance(){
    setFb(null);setInp("");
    const ni=qRef.current+1;
    if(ni<q.length){setIdx(ni);}
    else if(phase==="main"){
      if(retry.length>0){
        const rq=[...retry];
        setQ(prev=>[...prev,...rq.map(([x,y])=>Math.random()>.5?[y,x]:[x,y])]);
        setRetry([]);setPhase("retry");setIdx(ni);
      } else {setDone(true);}
    } else {setDone(true);}
  }

  const submit=useCallback(()=>{
    if(!inp||fb) return;
    clearInterval(tickRef.current);
    const[a,b]=q[idx],ok=parseInt(inp)===a*b;
    const nd=rec(data,a,b,ok);setData(nd);save(nd);
    setRes(prev=>[...prev,{a,b,ans:parseInt(inp),correct:ok}]);
    if(!ok&&phase==="main") setRetry(prev=>[...prev,[a,b]]);
    setFb(ok?"ok":"no");
    if(ok) setCk(c=>c+1);
    fbTimer.current=setTimeout(()=>advance(),ok?500:1800);
  },[inp,q,idx,data,retry,fb,phase]);

  if(done) return Result({res,mode,onDone});
  if(!q[idx]) return null;
  const[a,b]=q[idx];
  const dIdx=phase==="main"?idx+1:idx-origCount.current+1;
  const dTot=phase==="main"?origCount.current:q.length-origCount.current;
  const pPct=phase==="main"?((idx+1)/origCount.current*100):((idx-origCount.current+1)/(q.length-origCount.current)*100);

  return h("div",{style:{padding:"env(safe-area-inset-top,20px) 16px 20px",maxWidth:420,margin:"0 auto",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",minHeight:"100dvh",gap:8}},
    h(Confetti,{trigger:ck}),
    h("div",{style:{width:"100%",display:"flex",alignItems:"center",gap:12,marginBottom:4}},
      h("button",{onClick:()=>{clearInterval(tickRef.current);clearTimeout(fbTimer.current);onDone();},
        style:{background:"none",border:"none",fontSize:22,cursor:"pointer",color:"var(--c-text-dim)",padding:4}},"\u2190"),
      h("div",{style:{flex:1,height:6,borderRadius:3,background:"var(--c-surface-alt)",overflow:"hidden"}},
        h("div",{style:{height:"100%",borderRadius:3,background:phase==="retry"?"var(--c-orange)":mc.color,width:Math.min(pPct,100)+"%",transition:"width .3s"}})),
      h("span",{style:{fontSize:13,fontWeight:600,color:"var(--c-text-dim)",fontFamily:"'DM Sans',sans-serif",minWidth:48,textAlign:"right"}},dIdx+"/"+dTot)),
    h("div",{style:{fontSize:12,fontWeight:600,letterSpacing:1.5,color:phase==="retry"?"var(--c-orange)":mc.color,fontFamily:"'DM Sans',sans-serif",textTransform:"uppercase"}},
      phase==="retry"?"\uD83D\uDD04 Korrektur":(mc.icon+" "+mc.label)),
    h("div",{style:{display:"flex",alignItems:"center",gap:20,margin:"8px 0"}},
      h(TimerCircle,{timeLeft:timeLeft,totalTime:mc.time}),
      h("div",{key:idx,style:{fontSize:52,fontWeight:700,fontFamily:"'Fredoka',sans-serif",color:"var(--c-text)",animation:"fadeInUp .2s ease"}},a+" \u00D7 "+b)),
    h("div",{style:{fontSize:44,fontWeight:700,fontFamily:"'Fredoka',sans-serif",height:64,display:"flex",alignItems:"center",justifyContent:"center",
      color:fb==="ok"?"var(--c-green-text)":(fb==="no"||fb==="timeout")?"var(--c-red-text)":"var(--c-text)",
      background:fb==="ok"?"var(--c-green)":(fb==="no"||fb==="timeout")?"var(--c-red)":"var(--c-surface)",
      borderRadius:18,minWidth:170,padding:"0 28px",transition:"background .2s,color .2s",
      animation:(fb==="no"||fb==="timeout")?"shake .4s ease":fb==="ok"?"pulse .3s ease":"none"}},
      (fb==="no"||fb==="timeout")?h("span",{style:{fontSize:30}},a*b):(inp||h("span",{style:{opacity:.2}},"?"))),
    fb==="no"&&h("div",{style:{fontSize:13,color:"var(--c-red-text)",fontFamily:"'DM Sans',sans-serif",fontWeight:600,animation:"fadeInUp .2s"}},"Richtig: "+a*b),
    fb==="timeout"&&h("div",{style:{fontSize:13,color:"var(--c-red-text)",fontFamily:"'DM Sans',sans-serif",fontWeight:600,animation:"fadeInUp .2s"}},"\u23F0 Zeit abgelaufen! \u2192 "+a*b),
    h("div",{style:{marginTop:8,width:"100%",maxWidth:300}},
      h(NumPad,{value:inp,onInput:d=>{if(!fb&&inp.length<3)setInp(inp+d);},onDel:()=>{if(!fb)setInp(inp.slice(0,-1));},onOk:submit,disabled:!!fb})));
}

// ─── Results ───
function Result({res,mode,onDone}){
  const mc=MODES[mode];
  const ok=res.filter(r=>r.correct),wrong=res.filter(r=>!r.correct);
  const timeouts=res.filter(r=>r.timeout);
  const allOk=ok.length===res.length;
  const rate=res.length>0?Math.round(ok.length/res.length*100):0;

  return h("div",{style:{padding:"40px 20px",maxWidth:460,margin:"0 auto",textAlign:"center",animation:"slideIn .4s ease"}},
    allOk&&h(Confetti,{trigger:Date.now()}),
    h("div",{style:{fontSize:44,marginBottom:8}},allOk?"\uD83C\uDF89":rate>=80?"\uD83D\uDCAA":"\uD83D\uDCDD"),
    h("h2",{style:{fontFamily:"'Fredoka',sans-serif",fontSize:28,fontWeight:600,color:"var(--c-text)",margin:"0 0 4px"}},allOk?"Perfekt!":"Geschafft!"),
    h("p",{style:{fontFamily:"'DM Sans',sans-serif",fontSize:14,color:"var(--c-text-dim)",margin:"0 0 28px"}},mc.icon+" "+mc.label+" ("+mc.time+"s) beendet"),
    h("div",{style:{display:"grid",gridTemplateColumns:timeouts.length>0?"1fr 1fr 1fr":"1fr 1fr",gap:12,marginBottom:30}},
      [["Richtig",ok.length+"/"+res.length],["Quote",rate+"%"],...(timeouts.length>0?[["\u23F0 Zeitablauf",""+timeouts.length]]:[])].map(([l,v])=>
        h("div",{key:l,style:{background:"var(--c-surface)",borderRadius:16,padding:18}},
          h("div",{style:{fontSize:24,fontWeight:700,fontFamily:"'Fredoka',sans-serif",color:"var(--c-text)"}},v),
          h("div",{style:{fontSize:11,color:"var(--c-text-dim)",fontFamily:"'DM Sans',sans-serif",marginTop:3}},l)))),
    wrong.length>0&&h("div",{style:{marginBottom:24,textAlign:"left"}},
      h("h3",{style:{fontFamily:"'DM Sans',sans-serif",fontSize:13,fontWeight:700,color:"var(--c-text-dim)",marginBottom:8,letterSpacing:.5}},"\u274C Falsch beantwortet"),
      wrong.map((r,i)=>h("div",{key:i,style:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 14px",background:"var(--c-surface)",borderRadius:12,marginBottom:5,fontFamily:"'DM Sans',sans-serif",fontSize:15}},
        h("span",{style:{fontWeight:600,color:"var(--c-text)"}},r.a+" \u00D7 "+r.b+" = "+r.a*r.b),
        h("span",{style:{color:"var(--c-red-text)",fontWeight:600,fontSize:13}},r.timeout?"\u23F0 Zeit abgelaufen":"Deine Antwort: "+r.ans)))),
    h("button",{onClick:onDone,style:{padding:"14px 32px",borderRadius:14,border:"none",background:"var(--c-accent)",color:"#fff",fontSize:16,fontWeight:700,fontFamily:"'Fredoka',sans-serif",cursor:"pointer"}},
      "Zur\u00FCck zur \u00DCbersicht"));
}

// ─── App ───
function App(){
  const[data,setData]=useState(load);
  const[scr,setScr]=useState("map");
  const[qq,setQq]=useState([]);
  const[det,setDet]=useState(null);
  return h("div",{style:{minHeight:"100dvh",background:"var(--c-bg)"}},
    scr==="map"&&h(Heatmap,{data,onStart:m=>{setQq(sprintQ(data,SPRINT_N));setScr(m);},onCell:(a,b)=>setDet([a,b])}),
    (scr==="easy"||scr==="hard")&&h(Quiz,{key:scr+qq.length,initQ:qq,data,setData,mode:scr,onDone:()=>setScr("map")}),
    det&&h(Detail,{a:det[0],b:det[1],data,onClose:()=>setDet(null)}));
}
ReactDOM.createRoot(document.getElementById("root")).render(h(App));
</script>
